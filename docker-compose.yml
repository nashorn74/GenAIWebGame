version: "3.8"

services:
  db:
    image: postgres:14
    container_name: arkacia_db
    environment:
      POSTGRES_DB: my_database
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d my_database"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7
    container_name: arkacia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arkacia_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URI=postgresql://myuser:mypass@db:5432/my_database
      - REDIS_URL=redis://redis:6379/0
      - EVENTLET_NO_GREENDNS=yes
      - SECRET_KEY=${SECRET_KEY:-dev-fallback-key}
      - FLASK_DEBUG=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-devpass123}  # DEV ONLY — override in .env for prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: arkacia_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
